<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BringIt - 持ち物分担サービス</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }
        .container { max-width: 600px; margin: 0 auto; padding: 40px 20px; }
        .hero { text-align: center; margin-bottom: 40px; }
        .hero h1 { font-size: 2.5rem; color: #2563eb; margin-bottom: 8px; }
        .hero p { color: #666; font-size: 1.1rem; }
        .card { background: #fff; border-radius: 12px; padding: 32px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card h2 { margin-bottom: 20px; font-size: 1.3rem; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.9rem; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 1rem; transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #2563eb; }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .btn {
            display: inline-block; padding: 12px 24px; background: #2563eb; color: #fff;
            border: none; border-radius: 8px; font-size: 1rem; cursor: pointer;
            font-weight: 600; transition: background 0.2s; width: 100%;
        }
        .btn:hover { background: #1d4ed8; }
        .features { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 32px; }
        .feature { background: #f8fafc; padding: 16px; border-radius: 8px; text-align: center; }
        .feature-icon { font-size: 1.5rem; margin-bottom: 4px; }
        .feature-text { font-size: 0.85rem; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>BringIt</h1>
            <p>旅行・キャンプ・イベントの持ち物を<br>みんなで分担しよう</p>
        </div>
        <div class="card">
            <h2>新しいリストを作成</h2>
            <form action="/lists" method="POST">
                <div class="form-group">
                    <label for="title">リスト名</label>
                    <input type="text" id="title" name="title" placeholder="例: 夏キャンプ 2026" required>
                </div>
                <div class="form-group">
                    <label for="description">メモ（任意）</label>
                    <textarea id="description" name="description" placeholder="例: 8/10-12 河口湖キャンプ場"></textarea>
                </div>
                <button type="submit" class="btn">リストを作成する</button>
            </form>
        </div>
        <div class="features">
            <div class="feature">
                <div class="feature-icon">&#x1f4cb;</div>
                <div class="feature-text">リスト作成</div>
            </div>
            <div class="feature">
                <div class="feature-icon">&#x1f465;</div>
                <div class="feature-text">担当者設定</div>
            </div>
            <div class="feature">
                <div class="feature-icon">&#x2705;</div>
                <div class="feature-text">準備チェック</div>
            </div>
            <div class="feature">
                <div class="feature-icon">&#x1f517;</div>
                <div class="feature-text">URL共有</div>
            </div>
        </div>
    </div>
</body>
</html>
